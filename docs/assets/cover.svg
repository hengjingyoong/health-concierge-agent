<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#16283f"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e85d4a"/>
      <stop offset="1" stop-color="#f0884a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="64" y="86" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#f5f7fa">Health Concierge Agent</text>
  <text x="64" y="128" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#9fb3c8">A privacy-first medication &amp; checkup concierge — ADK multi-agent · MCP · Policy Server</text>

  <!-- User -->
  <rect x="64" y="180" width="180" height="56" rx="12" fill="#243b55"/>
  <text x="154" y="215" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#e8eef5" text-anchor="middle">👤 User</text>

  <!-- Policy gate band -->
  <rect x="64" y="270" width="1152" height="74" rx="14" fill="url(#gate)"/>
  <text x="88" y="301" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">⛔ Policy Server plugin — every tool call · every response</text>
  <text x="88" y="328" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#ffe9e2">structural gate (role × tool × env, deny-by-default)  ·  semantic gate (PII prefilter → LLM judge, FAILS CLOSED)</text>

  <!-- Agents box -->
  <rect x="64" y="376" width="1152" height="150" rx="14" fill="#1d3149" stroke="#33506f" stroke-width="1.5"/>
  <text x="88" y="410" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#7fd1b9">ADK multi-agent system</text>
  <rect x="88"  y="432" width="250" height="64" rx="10" fill="#243b55"/>
  <text x="213" y="459" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8eef5" text-anchor="middle">health_concierge</text>
  <text x="213" y="481" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9fb3c8" text-anchor="middle">coordinator (routing)</text>
  <rect x="362" y="432" width="196" height="64" rx="10" fill="#243b55"/>
  <text x="460" y="459" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8eef5" text-anchor="middle">medication</text>
  <text x="460" y="481" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9fb3c8" text-anchor="middle">HITL writes</text>
  <rect x="582" y="432" width="196" height="64" rx="10" fill="#243b55"/>
  <text x="680" y="459" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8eef5" text-anchor="middle">checkup</text>
  <text x="680" y="481" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9fb3c8" text-anchor="middle">trends &amp; flags</text>
  <rect x="802" y="432" width="196" height="64" rx="10" fill="#243b55"/>
  <text x="900" y="459" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8eef5" text-anchor="middle">triage</text>
  <text x="900" y="481" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9fb3c8" text-anchor="middle">red-flag escalation</text>
  <rect x="1022" y="432" width="170" height="64" rx="10" fill="#243b55"/>
  <text x="1107" y="459" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#e8eef5" text-anchor="middle">briefing</text>
  <text x="1107" y="481" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#9fb3c8" text-anchor="middle">parallel pipeline</text>

  <!-- Data layer -->
  <rect x="64" y="558" width="560 " height="98" rx="14" fill="#1d3149" stroke="#33506f" stroke-width="1.5"/>
  <text x="88" y="592" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#7fd1b9">MCP server (read-only)</text>
  <text x="88" y="620" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#c8d6e5">5 tools over stdio · PII masked AT THE BOUNDARY</text>
  <text x="88" y="642" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#c8d6e5">the LLM never sees raw identifiers</text>

  <rect x="656" y="558" width="560" height="98" rx="14" fill="#1d3149" stroke="#33506f" stroke-width="1.5"/>
  <text x="680" y="592" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#7fd1b9">Synthetic SQLite store</text>
  <text x="680" y="620" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#c8d6e5">mirrors a real personal health system's schema</text>
  <text x="680" y="642" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#c8d6e5">fixtures contain only [[PLACEHOLDER]] tokens — zero PII</text>

  <!-- connectors -->
  <line x1="154" y1="236" x2="154" y2="270" stroke="#5c7a99" stroke-width="3"/>
  <line x1="154" y1="344" x2="154" y2="376" stroke="#5c7a99" stroke-width="3"/>
  <line x1="344" y1="526" x2="344" y2="558" stroke="#5c7a99" stroke-width="3"/>
  <line x1="936" y1="526" x2="936" y2="558" stroke="#5c7a99" stroke-width="3"/>

  <!-- Eval badge -->
  <rect x="880" y="170" width="336" height="66" rx="12" fill="#153826" stroke="#2c7a4b" stroke-width="1.5"/>
  <text x="1048" y="197" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#7fd1b9" text-anchor="middle">Eval: 19/19 green</text>
  <text x="1048" y="221" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#a8d5c2" text-anchor="middle">quality 5.0 · trajectory 1.0 · PII leaks 0</text>
</svg>
